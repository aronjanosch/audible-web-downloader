{% extends "base.html" %}

{% block title %}Downloads — Audible Downloader{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/downloads.css') }}">
{% endblock %}

{% block content %}

<div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center gap-3">
        <a href="/" class="btn btn-sm btn-outline-secondary">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h4 class="mb-0">Downloads</h4>
    </div>
    <button class="btn btn-sm btn-outline-secondary" id="clearDoneBtn">
        <i class="fas fa-trash-alt me-1"></i>Clear done
    </button>
</div>

<!-- In Progress -->
<div class="dl-section-label">
    <span>In Progress</span>
    <span class="dl-count" id="inProgressCount">0</span>
</div>
<div id="inProgressList"></div>

<!-- Done -->
<div class="dl-section-label mt-4">
    <span>Done</span>
    <span class="dl-count" id="doneCount">0</span>
</div>
<div id="doneList"></div>

{% endblock %}
